global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: governance
    static_configs:
      - targets: ['governance:8090']
    metrics_path: /metrics

  - job_name: review-server
    static_configs:
      - targets: ['review-server:9003']
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics

  - job_name: linter-stub
    static_configs:
      - targets: ['linter-stub:9002']
    metrics_path: /metrics

  - job_name: sre-stub
    static_configs:
      - targets: ['sre-stub:9005']
    metrics_path: /metrics

  - job_name: diff-proxy
    static_configs:
      - targets: ['diff-proxy:9001']
    metrics_path: /metrics

  - job_name: github-mcp
    static_configs:
      - targets: ['github-mcp:9010']
    metrics_path: /metrics

  - job_name: skills-registry-server
    static_configs:
      - targets: ['skills-registry-server:9006']
    metrics_path: /metrics
