[tool.uv.workspace]
members = ["packages/*", "services/governance", "services/review_server", "stub_servers"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: requires Docker stack",
    "e2e: full graph, slow",
    "live: requires real LLM (not cassette-recorded)",
    "load: performance / concurrency tests (slow, run standalone)",
]

[tool.ruff]
line-length = 100
