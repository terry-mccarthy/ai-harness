[project]
name = "harness-tests"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "jsonschema>=4.22",
    "ollama>=0.3",
    "harness-agents",
    "harness-gateway",
    "pymysql>=1.1",
    "pyjwt>=2.8",
    "httpx>=0.27",
]

[tool.setuptools.packages.find]
where = ["."]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
