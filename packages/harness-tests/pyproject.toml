[project]
name = "harness-tests"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "jsonschema>=4.22",
    "ollama>=0.3",
    "harness-agents",
    "harness-gateway",
    "harness-memory",
    "harness-supervisor",
    "python-dotenv>=1.0",
    "pymysql>=1.1",
    "pyjwt>=2.8",
    "httpx>=0.27",
    "pyyaml>=6.0",
    # mcp[cli] is needed by test_git_diff_github.py and test_unit_linter.py,
    # which import from stub_servers/ directly (those modules use FastMCP).
    "mcp[cli]>=1.27",
]

[tool.uv.sources]
harness-agents = { workspace = true }
harness-gateway = { workspace = true }
harness-memory     = { workspace = true }
harness-supervisor = { workspace = true }

[tool.setuptools.packages.find]
where = ["."]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
