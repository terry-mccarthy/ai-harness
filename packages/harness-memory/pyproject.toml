[project]
name = "harness-memory"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.29",
    "psycopg[binary,pool]>=3.1",
    "langgraph>=0.2",
    "langgraph-checkpoint-postgres>=2.0",
    "redis[hiredis]>=5.0",
    "pymysql>=1.1",
    "alembic>=1.13",
    "sqlalchemy>=2.0",
    "numpy>=1.26",
]

[tool.setuptools.packages.find]
where = ["."]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
