services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: harness
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
    ports: ["5432:5432"]
    volumes:
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness"]
      interval: 15s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      retries: 5

  opa:
    image: openpolicyagent/opa:latest
    command: run --server --addr :8181 /policies
    volumes:
      - ./policies:/policies:ro
    ports: ["8181:8181"]

  mcpjungle:
    image: mcpjungle/mcpjungle:latest
    ports: ["8080:8080"]
    environment:
      OPA_URL: http://opa:8181
      DATABASE_URL: postgres://harness:harness@postgres:5432/harness
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/mcpjungle", "list", "servers", "--registry", "http://localhost:8080"]
      interval: 15s
      retries: 10

  diff-proxy:
    build:
      context: ./stub_servers
      dockerfile: Dockerfile.stub
    command: python diff_proxy_server.py
    ports: ["9001:9001"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',9001)); s.close()\""]
      interval: 15s
      retries: 10

  linter-stub:
    build:
      context: ./stub_servers
      dockerfile: Dockerfile.stub
    command: python linter_server.py
    ports: ["9002:9002"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',9002)); s.close()\""]
      interval: 15s
      retries: 10

  register-diff-proxy:
    image: mcpjungle/mcpjungle:latest
    command: ["register", "--name", "diff_proxy", "--url", "http://diff-proxy:9001/mcp", "--registry", "http://mcpjungle:8080", "--force"]
    depends_on:
      mcpjungle:
        condition: service_healthy
      diff-proxy:
        condition: service_healthy
    restart: "no"

  register-linter:
    image: mcpjungle/mcpjungle:latest
    command: ["register", "--name", "linter_stub", "--url", "http://linter-stub:9002/mcp", "--registry", "http://mcpjungle:8080", "--force"]
    depends_on:
      mcpjungle:
        condition: service_healthy
      linter-stub:
        condition: service_healthy
    restart: "no"

  review-server:
    build:
      context: .
      dockerfile: services/review_server/Dockerfile
    ports: ["9003:9003"]
    environment:
      MCPJUNGLE_URL: http://mcpjungle:8080
      GOVERNANCE_URL: http://governance:8090
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.1}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-1024}
      CODE_REVIEWER_SECRET: ${CODE_REVIEWER_SECRET}
      ARCHITECT_SECRET: ${ARCHITECT_SECRET:-architect-secret}
      ADVERSARIAL_CODE_CRITIC_SECRET: ${ADVERSARIAL_CODE_CRITIC_SECRET:-adversarial-code-critic-secret}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      REVIEW_API_KEY: ${REVIEW_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      PG_DSN: postgresql://harness:harness@postgres:5432/harness
    depends_on:
      mcpjungle:
        condition: service_healthy
      governance:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',9003)); s.close()\""]
      interval: 15s
      retries: 10

  register-review-server:
    image: mcpjungle/mcpjungle:latest
    command: ["register", "--name", "review_server", "--url", "http://review-server:9003/mcp", "--registry", "http://mcpjungle:8080", "--force"]
    depends_on:
      mcpjungle:
        condition: service_healthy
      review-server:
        condition: service_healthy
    restart: "no"

  dolt:
    build:
      context: ./services/dolt
    ports: ["3306:3306"]
    volumes:
      - dolt-data:/doltdata
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P 3306 -u root --connect-timeout=2 -e 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 15s
      retries: 20
      start_period: 60s

  github-mcp:
    build:
      context: .
      dockerfile: services/github_mcp/Dockerfile
    ports: ["9010:9010"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ARCHITECT_DEFAULT_REPO: ${ARCHITECT_DEFAULT_REPO:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',9010)); s.close()\""]
      interval: 15s
      retries: 10

  register-github-mcp:
    image: mcpjungle/mcpjungle:latest
    command: ["register", "--name", "github_mcp", "--url", "http://github-mcp:9010/mcp", "--registry", "http://mcpjungle:8080", "--force"]
    depends_on:
      mcpjungle:
        condition: service_healthy
      github-mcp:
        condition: service_healthy
    restart: "no"

  sre-stub:
    build:
      context: .
      dockerfile: stub_servers/Dockerfile.sre
    command: python sre_server.py
    ports: ["9005:9005"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PG_DSN: postgresql://harness:harness@postgres:5432/harness
      REDIS_URL: redis://redis:6379
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      OLLAMA_HOST: http://host.docker.internal:11434
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',9005)); s.close()\""]
      interval: 15s
      retries: 10

  register-architect:
    image: mcpjungle/mcpjungle:latest
    # architect_stub now served by github-mcp (read-only codebase_search + adr_read).
    # Write tools (adr_write, diagram_gen) removed — architect role is review-only.
    command: ["register", "--name", "architect_stub", "--url", "http://github-mcp:9010/mcp", "--registry", "http://mcpjungle:8080", "--force"]
    depends_on:
      mcpjungle:
        condition: service_healthy
      github-mcp:
        condition: service_healthy
    restart: "no"

  register-sre:
    image: mcpjungle/mcpjungle:latest
    command: ["register", "--name", "sre_stub", "--url", "http://sre-stub:9005/mcp", "--registry", "http://mcpjungle:8080", "--force"]
    depends_on:
      mcpjungle:
        condition: service_healthy
      sre-stub:
        condition: service_healthy
    restart: "no"

  skills-registry-server:
    build:
      context: .
      dockerfile: services/skills_registry/Dockerfile
    ports: ["9006:9006"]
    environment:
      GOVERNANCE_URL: http://governance:8090
      MCPJUNGLE_URL: http://mcpjungle:8080
      REGISTRY_OPERATOR_SECRET: ${REGISTRY_OPERATOR_SECRET:-human-operator-secret}
      SRE_SECRET: ${SRE_SECRET:-sre-secret}
      CODE_REVIEWER_SECRET: ${CODE_REVIEWER_SECRET:-code-reviewer-secret}
      ARCHITECT_SECRET: ${ARCHITECT_SECRET:-architect-secret}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      governance:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',9006)); s.close()\""]
      interval: 15s
      retries: 10

  register-skills-registry:
    image: mcpjungle/mcpjungle:latest
    command: ["register", "--name", "registry", "--url", "http://skills-registry-server:9006/mcp", "--registry", "http://mcpjungle:8080", "--force"]
    depends_on:
      mcpjungle:
        condition: service_healthy
      skills-registry-server:
        condition: service_healthy
    restart: on-failure

  governance:
    build:
      context: ./services/governance
    ports: ["8090:8090"]
    volumes:
      - "./test-fixtures/jwt-test-key.pem:/run/secrets/jwt_private_key:ro"
    environment:
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      ENV: test
      OPA_URL: http://opa:8181
      CODE_REVIEWER_SECRET: ${CODE_REVIEWER_SECRET}
      ARCHITECT_SECRET: ${ARCHITECT_SECRET:-architect-secret}
      ADVERSARIAL_CODE_CRITIC_SECRET: ${ADVERSARIAL_CODE_CRITIC_SECRET:-adversarial-code-critic-secret}
      SRE_SECRET: ${SRE_SECRET:-sre-secret}
      HUMAN_OPERATOR_SECRET: ${HUMAN_OPERATOR_SECRET:-human-operator-secret}
      EXPIRY_PASS_INTERVAL: "3"
      DOLT_HOST: dolt
      DOLT_PORT: "3306"
      DOLT_USER: root
      DOLT_PASSWORD: root
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      opa:
        condition: service_started
      dolt:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',8090)); s.close()\""]
      interval: 15s
      retries: 10

  contextforge:
    image: ghcr.io/ibm/mcp-context-forge:latest
    ports: ["4444:4444"]
    environment:
      JWT_SECRET_KEY: "${CF_JWT_SECRET:-cf-dev-secret-key-at-least-32-bytes-long}"
      AUTH_ENCRYPTION_SECRET: "${CF_ENC_SECRET:-cf-enc-secret-at-least-32-bytes-long-ok}"
      DATABASE_URL: "sqlite:///./mcpgateway.db"
      HOST: "0.0.0.0"
      PORT: "4444"
      ENVIRONMENT: "development"
      BASIC_AUTH_USER: "admin"
      BASIC_AUTH_PASSWORD: "Admin123!"
      PLATFORM_ADMIN_EMAIL: "${CF_ADMIN_EMAIL:-admin@harness.local}"
      DEFAULT_USER_PASSWORD: "Admin123!"
      CACHE_TYPE: "memory"
      APP_DOMAIN: "http://localhost:4444"
      AUTH_REQUIRED: "true"
      SSRF_ALLOW_PRIVATE_NETWORKS: "true"
      SSRF_ALLOW_LOCALHOST: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4444/health | grep -q healthy || exit 1"]
      interval: 10s
      retries: 12
      start_period: 20s

  setup-contextforge:
    image: python:3.12-slim
    environment:
      CF_URL: "http://contextforge:4444"
      CF_JWT_SECRET: "${CF_JWT_SECRET:-cf-dev-secret-key-at-least-32-bytes-long}"
      CF_ADMIN_EMAIL: "${CF_ADMIN_EMAIL:-admin@harness.local}"
      CF_SERVER_NAME: "harness_all"
    volumes:
      - ./services/contextforge_setup:/app:ro
    command: >
      bash -c "pip install httpx pyjwt --quiet && python /app/setup.py"
    depends_on:
      contextforge:
        condition: service_healthy
      sre-stub:
        condition: service_healthy
      diff-proxy:
        condition: service_healthy
      linter-stub:
        condition: service_healthy
    restart: "no"

  # Monitoring stack (otel-collector, Prometheus, Grafana) has moved to its own
  # compose project so it can be stood up independently:
  #   docker compose -f docker-compose.monitoring.yml up -d   (or: make monitoring-up)

volumes:
  dolt-data:
  postgres-data:
