# Standalone monitoring stack (otel-collector, Prometheus, Grafana).
#
# Runs as its own compose project so it can be brought up/down independently of
# the main app stack:
#
#   docker compose -f docker-compose.monitoring.yml up -d
#   docker compose -f docker-compose.monitoring.yml down
#
# Prometheus scrapes the app services by their compose DNS names
# (governance, review-server, sre-stub, ...). Those containers live in the main
# `friday` stack, so this stack attaches to that stack's network as an external
# network. Bring the main stack up first (there is nothing to scrape otherwise);
# until then Prometheus simply reports those targets as down.
name: friday-monitoring

networks:
  friday_default:
    external: true

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector.yml"]
    networks: [friday_default]
    volumes:
      - ./services/otel-collector/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC — Claude Code pushes here from the Mac host

  prometheus:
    image: prom/prometheus:latest
    networks: [friday_default]
    ports: ["9090:9090"]
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    networks: [friday_default]
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
