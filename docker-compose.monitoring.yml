# Standalone monitoring stack (otel-collector, Prometheus, Grafana).
#
# Fully decoupled from the main app stack — no shared network, no dependency
# on `friday` being up first. It can be started/stopped independently in any
# order:
#
#   docker compose -f docker-compose.monitoring.yml up -d
#   docker compose -f docker-compose.monitoring.yml down
#
# Prometheus scrapes the app services (governance, review-server, sre-stub,
# ...) via their host-published ports on host.docker.internal, since the main
# `friday` compose already exposes all of them to the host. If the main stack
# isn't running, those targets just show as down in Prometheus.
name: friday-monitoring

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./services/otel-collector/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC — Claude Code pushes here from the Mac host

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  prometheus-data:
